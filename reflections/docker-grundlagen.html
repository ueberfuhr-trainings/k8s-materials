<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker Grundlagen Quiz - ATVANTAGE Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #111111;
      color: #eeeeee;
    }

    .academy-header {
      background-color: #1e1e1e;
      border-bottom: 3px solid #ff5401;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    .quiz-card {
      background-color: #1e1e1e;
      border: 1px solid #333333;
      transition: all 0.3s ease;
    }

    .option-btn {
      background-color: #2a2a2a;
      border: 2px solid #333333;
      transition: all 0.2s ease;
      text-align: left;
    }

    .option-btn:hover:not(:disabled) {
      background-color: #333333;
      border-color: #444444;
    }

    .option-btn.correct {
      background-color: #14532d;
      border-color: #22c55e;
    }

    .option-btn.wrong {
      background-color: #431407;
      border-color: #ff5401;
    }

    .code-block {
      background-color: #000000;
      font-family: 'Courier New', Courier, monospace;
      border: 1px solid #333333;
    }

    .email-hover-bridge::before {
      content: '';
      position: absolute;
      top: -20px;
      left: 0;
      right: 0;
      height: 20px;
      background: transparent;
    }
  </style>
</head>
<body>

<!-- Academy Top Bar -->
<nav class="academy-header sticky top-0 z-40 w-full px-6 h-16 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <span class="text-xl font-black tracking-tighter text-[#ff5401]">ATVANTAGE</span>
    <span class="text-xl font-light text-neutral-500">Academy</span>
  </div>
  <div class="flex items-center gap-4">
    <div class="relative group">
      <button id="email-btn" class="p-2 text-neutral-400 hover:text-[#ff5401] transition-colors"
              title="E-Mail Kontakt">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </button>
      <div class="absolute right-0 top-10 hidden group-hover:flex items-center gap-3 bg-[#2a2a2a] border border-[#333333] p-2 px-3 rounded-lg shadow-2xl z-50 email-hover-bridge">
        <a id="email-link-display" href="#"
           class="text-sm font-medium text-slate-300 hover:text-[#ff5401] transition-colors underline decoration-dotted underline-offset-4 decoration-slate-600">academy@atvantage.com</a>
        <button id="copy-email-sub-btn"
                class="bg-[#ff5401] hover:bg-[#e64a00] p-1.5 rounded transition-colors text-[#111111]"
                title="Kopieren">
          <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
          </svg>
          <svg id="check-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="w-full min-h-screen flex items-center justify-center p-4 md:p-8">

<div id="quiz-container" class="w-full max-w-2xl">
  <!-- Header -->
  <div class="mb-8 text-center">
    <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Docker <span class="text-[#ff5401]">Grundlagen-Check</span></h1>
    <p class="text-neutral-500">Auffrischung der Container-Basics vor dem Kubernetes-Kurs</p>
    <div class="mt-4 flex justify-between items-center text-xs text-neutral-500 mb-1">
      <span id="question-counter">Frage 1 von 16</span>
      <span id="score-counter">Punkte: 0</span>
    </div>
    <div class="h-2 w-full bg-[#1e1e1e] rounded-full overflow-hidden border border-[#333333]">
      <div id="progress-bar" class="h-full bg-[#ff5401] transition-all duration-500" style="width: 0%"></div>
    </div>
  </div>

  <!-- Question Card -->
  <div id="question-card" class="quiz-card p-6 rounded-2xl shadow-2xl">
    <div id="question-content">
    </div>

    <div id="options-container" class="space-y-3 mt-6">
    </div>

    <div id="feedback" class="mt-6 p-4 rounded-lg hidden border-l-4">
    </div>

    <button id="next-btn"
            class="mt-6 w-full py-3 bg-[#ff5401] hover:bg-[#e64a00] font-semibold rounded-xl transition-colors hidden text-white">
      Nächste Frage
    </button>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="quiz-card p-8 rounded-2xl shadow-2xl text-center hidden">
    <h2 class="text-4xl font-extrabold text-white mb-4">Training <span class="text-[#ff5401]">beendet!</span></h2>
    <p id="final-score" class="text-xl mb-6"></p>
    <div id="score-interpretation" class="mb-8 text-neutral-400"></div>
    <button onclick="location.reload()" class="px-8 py-3 bg-[#ff5401] hover:bg-[#e64a00] font-semibold rounded-xl text-white transition-colors">
      Quiz neu starten
    </button>
  </div>
</div>

</div>

<script>
  function getAcademyEmail() {
    const part1 = 'academy';
    const part2 = 'atvantage.com';
    return part1 + '@' + part2;
  }

  // E-Mail Anzeige initialisieren
  const emailLink = document.getElementById('email-link-display');
  emailLink.innerText = getAcademyEmail();

  // E-Mail Logik (Header Button)
  document.getElementById('email-btn').onclick = function () {
    window.location.href = 'mailto:' + getAcademyEmail();
  };

  // E-Mail Logik (Popup Link)
  emailLink.onclick = function (e) {
    e.preventDefault();
    window.location.href = 'mailto:' + getAcademyEmail();
  };
  emailLink.onmouseenter = function () {
    this.href = 'mailto:' + getAcademyEmail();
  };

  // E-Mail Kopieren
  document.getElementById('copy-email-sub-btn').onclick = function () {
    const email = getAcademyEmail();
    const temp = document.createElement('textarea');
    temp.value = email;
    document.body.appendChild(temp);
    temp.select();
    try {
      document.execCommand('copy');
      const copyIcon = document.getElementById('copy-icon');
      const checkIcon = document.getElementById('check-icon');
      copyIcon.classList.add('hidden');
      checkIcon.classList.remove('hidden');
      setTimeout(() => {
        copyIcon.classList.remove('hidden');
        checkIcon.classList.add('hidden');
      }, 2000);
    } catch (err) {
      console.error('Kopieren fehlgeschlagen');
    }
    document.body.removeChild(temp);
  };

  const questions = [
    {
      description: "In Docker – und später in Kubernetes – begegnen dir ständig zwei Begriffe: Images und Container.",
      question: "Was ist der Unterschied zwischen einem Image und einem Container?",
      options: [
        { text: "Ein Image ist eine unveränderliche Vorlage, ein Container eine laufende Instanz davon.", correct: true, feedback: "Richtig! Aus einem Image lassen sich beliebig viele gleichartige Container starten – die Grundlage jeder Skalierung." },
        { text: "Ein Container ist die eigentliche Vorlage, aus der beim Build die verschiedenen Images abgeleitet und anschließend in die Registry geschoben werden.", correct: false, feedback: "Genau andersherum: Das Image ist die Vorlage, der Container die laufende Instanz." },
        { text: "Die beiden Begriffe sind austauschbar und meinen dasselbe.", correct: false, feedback: "Nein, es sind zwei klar getrennte Konzepte: Bauartefakt vs. laufende Instanz." },
        { text: "Ein Image existiert nur in der Cloud, ein Container läuft nur lokal auf dem Rechner.", correct: false, feedback: "Beides kann sowohl lokal als auch remote existieren." }
      ]
    },
    {
      description: "Ein Container durchläuft während seines Lebens verschiedene Zustände.",
      question: "Was passiert mit einem Container, dessen Hauptprozess sich beendet?",
      options: [
        { text: "Er stoppt (Status 'Exited') und existiert weiter, bis er entfernt wird – von selbst startet kein neuer.", correct: true, feedback: "Richtig! Der Container-Lebenszyklus hängt am Hauptprozess (PID 1). Automatische Neustarts übernimmt erst eine Restart-Policy – in Kubernetes ein Controller." },
        { text: "Der Container läuft im Leerlauf einfach weiter und wartet im Hintergrund darauf, dass ihm neue Aufgaben oder Requests zugewiesen werden.", correct: false, feedback: "Nein – endet der Hauptprozess, endet der Container." },
        { text: "Er wird sofort automatisch neu gestartet.", correct: false, feedback: "Nur mit einer Restart-Policy. Ohne bleibt er im gestoppten Zustand." },
        { text: "Er wird automatisch gelöscht und hinterlässt keine Spuren.", correct: false, feedback: "Nur wenn er ausdrücklich mit einer 'nach Ende entfernen'-Option gestartet wurde." }
      ]
    },
    {
      description: "Ein Container nimmt zur Laufzeit Änderungen an seinem Dateisystem vor, wird verworfen und neu aus dem Image erstellt – die Änderungen sind weg.",
      question: "Welches Grundprinzip erklärt dieses Verhalten?",
      options: [
        { text: "Das Schreib-Dateisystem eines Containers ist flüchtig – es lebt und stirbt mit dem Container.", correct: true, feedback: "Richtig! Container gelten als kurzlebig und ersetzbar. Zustand gehört in Volumes oder externe Dienste." },
        { text: "Docker löscht aus Sicherheitsgründen nach jedem Lauf automatisch sämtliche Dateien, um zu verhindern, dass sensible Daten im Container zurückbleiben.", correct: false, feedback: "Docker löscht nichts aktiv – ein neu erstellter Container startet einfach wieder vom Image-Zustand." },
        { text: "Der Container hatte schlicht zu wenig Speicherplatz.", correct: false, feedback: "Nein, das Verhalten liegt am flüchtigen Dateisystem, nicht am Speicher." },
        { text: "Das zugrunde liegende Image war vermutlich beschädigt.", correct: false, feedback: "Nein, das ist völlig normales, erwartetes Verhalten." }
      ]
    },
    {
      description: "Eine Web-Anwendung soll bei Lastspitzen einfach durch mehr Instanzen skaliert werden.",
      question: "Warum ist es dafür wichtig, dass die Anwendung zustandslos (stateless) ist?",
      options: [
        { text: "Weil dann jede Instanz jeden Request bearbeiten kann und man beliebig hoch- und runterskalieren kann.", correct: true, feedback: "Richtig! Zustandslosigkeit ist die Voraussetzung für horizontale Skalierung und Selbstheilung. Sitzungsdaten gehören in externe Speicher (DB, Cache)." },
        { text: "Weil zustandslose Anwendungen grundsätzlich weniger CPU und Arbeitsspeicher verbrauchen und deshalb mehr Instanzen auf dieselbe Hardware passen.", correct: false, feedback: "Das ist kein direkter Zusammenhang." },
        { text: "Weil man dann gar keine Datenbank mehr benötigt.", correct: false, feedback: "Nein – der Zustand wird nur ausgelagert, nicht abgeschafft." },
        { text: "Weil zustandslose Container keine Umgebungsvariablen mehr brauchen.", correct: false, feedback: "Kein Zusammenhang – Konfiguration per Umgebungsvariable bleibt unabhängig davon sinnvoll." }
      ]
    },
    {
      description: "Eine Datenbank im Container speichert ihre Daten standardmäßig im Container-Dateisystem.",
      question: "Wie stellt man sicher, dass die Daten das Ersetzen oder Löschen des Containers überleben?",
      options: [
        { text: "Mit einem Volume – es speichert Daten außerhalb des Container-Lebenszyklus.", correct: true, feedback: "Richtig! Volumes sind der Standardweg für persistente Daten – in Kubernetes begegnen sie dir als PersistentVolumes wieder." },
        { text: "Man muss die Daten vor jedem Löschen manuell mit einem Export-Werkzeug sichern und nach dem Neustart wieder einspielen – eine andere Möglichkeit gibt es nicht.", correct: false, feedback: "Manuelle Exports sind umständlich. Volumes sind die eingebaute Lösung." },
        { text: "Docker erstellt vor dem Löschen automatisch ein vollständiges Backup.", correct: false, feedback: "Nein, Docker sichert nichts automatisch. Ohne Volume sind die Daten weg." },
        { text: "Die Daten bleiben einfach im Image erhalten und sind wieder da.", correct: false, feedback: "Falsch – Laufzeit-Änderungen werden nicht ins Image zurückgeschrieben." }
      ]
    },
    {
      description: "Ein Backend-Container muss eine Datenbank in einem anderen Container erreichen.",
      question: "Wie finden sich zwei Container in einem gemeinsamen Netzwerk gegenseitig?",
      options: [
        { text: "Über den Container-/Service-Namen als Hostname – ein eingebauter DNS-Dienst löst ihn auf.", correct: true, feedback: "Richtig! Dieses Prinzip 'stabiler Name statt fester IP' ist genau das, was in Kubernetes ein Service leistet." },
        { text: "Über die IP-Adresse des Host-Rechners zusammen mit den nach außen gemappten Ports, die man vorher pro Container manuell festlegen und dokumentieren muss.", correct: false, feedback: "Möglich, aber fragil und nicht der empfohlene Weg für Container-zu-Container-Kommunikation." },
        { text: "Gar nicht – jeder Container ist grundsätzlich vollständig isoliert.", correct: false, feedback: "Container in einem gemeinsamen Netzwerk können sehr wohl miteinander kommunizieren." },
        { text: "Über eine direkte Shared-Memory-Verbindung zwischen den Containern.", correct: false, feedback: "Container kommunizieren über Netzwerkprotokolle, nicht über Shared Memory." }
      ]
    },
    {
      description: "Die 12-Factor-App-Methodik beschreibt Best Practices für moderne Cloud-Anwendungen.",
      question: "Wie sollte eine 12-Factor-App laut Faktor III ('Config') ihre Konfiguration erhalten?",
      options: [
        { text: "Über Umgebungsvariablen, die von außen gesetzt werden.", correct: true, feedback: "Richtig! Umgebungsvariablen trennen Konfiguration sauber vom Code und lassen sich pro Deployment ändern." },
        { text: "Über eine fest im Image eingebettete Konfigurationsdatei, die pro Umgebung angepasst und mitgebaut wird.", correct: false, feedback: "Nein – dann müsste pro Umgebung (Dev, Staging, Prod) ein eigenes Image gebaut werden." },
        { text: "Über fest im Quellcode kodierte Werte, die beim Kompilieren gesetzt werden.", correct: false, feedback: "Das koppelt Konfiguration und Code und verhindert Umgebungswechsel ohne Neu-Build." },
        { text: "Über eine zentrale Datenbank, die jeder Service bei jedem einzelnen Request erneut abfragt.", correct: false, feedback: "Das wäre ein Single Point of Failure und widerspricht dem 12-Factor-Prinzip." }
      ]
    },
    {
      description: "Nach der 12-Factor-Methodik behandelt eine App ihre Logs auf eine bestimmte Weise (Faktor XI, 'Logs').",
      question: "Wohin sollte eine containerisierte Anwendung ihre Logs schreiben?",
      options: [
        { text: "Als Event-Stream nach stdout/stderr – die Plattform sammelt sie ein und leitet sie weiter.", correct: true, feedback: "Richtig! So können Docker und Kubernetes die Logs zentral abgreifen. Die App verwaltet selbst keine Logdateien." },
        { text: "In eine rotierende Logdatei innerhalb des Containers, die man per Cronjob aufräumt und zur Auswertung regelmäßig vom Node herunterkopiert.", correct: false, feedback: "Die wäre flüchtig, ginge mit dem Container verloren und ist schwer zentral auszuwerten." },
        { text: "Direkt in eine fest verdrahtete zentrale Log-Datenbank.", correct: false, feedback: "Das koppelt die App zu eng an eine konkrete Infrastruktur." },
        { text: "Logs sollten aus Performancegründen ganz deaktiviert werden.", correct: false, feedback: "Nein, Logs sind wichtig – entscheidend ist nur der Transportweg." }
      ]
    },
    {
      description: "Eine Anwendung nutzt eine Datenbank – in der Entwicklung eine lokale, in Produktion eine gehostete.",
      question: "Wie behandelt eine 12-Factor-App solche 'Backing Services' (Datenbanken, Caches, Queues)?",
      options: [
        { text: "Als angehängte Ressourcen, die per Konfiguration (z.B. eine Connection-URL) austauschbar sind – ohne Codeänderung.", correct: true, feedback: "Richtig! Dev- und Prod-Datenbank unterscheiden sich nur in der Konfiguration, der Code bleibt identisch." },
        { text: "Sie werden fest in den Anwendungscode kompiliert, sodass für jede Datenbank oder jeden Cache eine eigene Programmversion gebaut und ausgeliefert werden muss.", correct: false, feedback: "Das verhindert den Wechsel zwischen Umgebungen ohne Neu-Build." },
        { text: "Jeder Backing Service muss zwingend im selben Container laufen.", correct: false, feedback: "Nein, es sind eigenständige, über das Netzwerk erreichbare Dienste." },
        { text: "Backing Services dürfen ausschließlich lokal betrieben werden.", correct: false, feedback: "Beides ist möglich – genau darum geht es bei der Austauschbarkeit." }
      ]
    },
    {
      description: "Ein Container läuft (Prozess gestartet), aber die Anwendung darin fährt noch hoch und nimmt noch keine Anfragen an.",
      question: "Warum reicht 'der Container läuft' nicht aus, um Traffic auf ihn zu leiten?",
      options: [
        { text: "Weil 'gestartet' nicht gleich 'bereit' ist – ein Health Check prüft die tatsächliche Antwortbereitschaft.", correct: true, feedback: "Richtig! Genau diese Unterscheidung führt in Kubernetes zu Readiness- und Liveness-Probes." },
        { text: "Doch, es reicht völlig – sobald der Container-Prozess gestartet ist, hat die Anwendung darin garantiert schon alle Verbindungen aufgebaut und ist sofort bereit.", correct: false, feedback: "Nein, Startvorgänge wie DB-Verbindungen oder das Laden von Caches brauchen Zeit." },
        { text: "Weil ein laufender Container ohnehin nie Traffic bekommt.", correct: false, feedback: "Ohne Bereitschaftsprüfung bekäme er sogar zu früh Traffic." },
        { text: "Weil Container generell keinen Netzwerkverkehr annehmen können.", correct: false, feedback: "Können sie – es geht um den richtigen Zeitpunkt der Bereitschaft." }
      ]
    },
    {
      description: "Ein Architekt überlegt, ob Anwendung und Datenbank in denselben Container gehören.",
      question: "Warum trennt man Anwendung und Datenbank üblicherweise in getrennte Container?",
      options: [
        { text: "Weil man sie so unabhängig skalieren, aktualisieren und neu starten kann.", correct: true, feedback: "Richtig! Getrennte Lebenszyklen sind die Basis für gezielte Skalierung und einfache Updates." },
        { text: "Weil ein Container technisch immer nur einen einzigen Prozess ausführen kann und das Betriebssystem im Container einen zweiten Prozess sofort beenden würde.", correct: false, feedback: "Technisch ginge mehr – es ist aber bewusst eine Best Practice, es nicht zu tun." },
        { text: "Weil ein Container nicht genug Speicher für zwei Dienste hat.", correct: false, feedback: "Das ist keine technische Einschränkung." },
        { text: "Es gibt keinen echten Grund – alles in einen Container ist einfacher.", correct: false, feedback: "Kurzfristig einfacher, langfristig problematisch bei Updates, Skalierung und Fehlersuche." }
      ]
    },
    {
      description: "Eine Anwendung besteht aus Frontend, Backend und einer rechenintensiven Bildverarbeitung. Nur die Bildverarbeitung ist unter Last überfordert.",
      question: "Welchen Vorteil bietet es, jede Komponente als eigenes Image/Container zu betreiben?",
      options: [
        { text: "Man kann gezielt nur die überlastete Komponente hochskalieren.", correct: true, feedback: "Richtig! Modularität erlaubt gezielte, ressourcensparende Skalierung – ein Kernvorteil, den Kubernetes voll ausspielt." },
        { text: "Man spart Arbeitsspeicher und Festplattenplatz, weil sich alle drei Container automatisch dasselbe Basis-Image teilen und es nur einmal vorgehalten wird.", correct: false, feedback: "Sie teilen nicht zwingend dasselbe Image – der Vorteil liegt in der unabhängigen Skalierbarkeit." },
        { text: "Die Anwendung wird dadurch automatisch zustandslos.", correct: false, feedback: "Zustandslosigkeit ist eine Design-Entscheidung, keine Folge der Aufteilung." },
        { text: "Man braucht dann keine Netzwerkverbindungen mehr zwischen den Teilen.", correct: false, feedback: "Im Gegenteil – die getrennten Teile kommunizieren über das Netzwerk." }
      ]
    },
    {
      description: "Ein Image wird in der CI einmal gebaut und dann unverändert durch Dev, Staging und Produktion gereicht – nur die Konfiguration ändert sich.",
      question: "Warum baut man nicht pro Umgebung ein eigenes Image?",
      options: [
        { text: "Weil dasselbe unveränderliche Artefakt getestet und ausgeliefert wird – das schafft Dev-Prod-Parität.", correct: true, feedback: "Richtig! Ein Image ist immutable: einmal bauen, überall laufen lassen, nur die Config (z.B. Umgebungsvariablen) variiert." },
        { text: "Weil Docker das Bauen mehrerer Images pro Projekt technisch verbietet und beim Push mit demselben Namen den vorherigen Build ohne Warnung überschreibt.", correct: false, feedback: "Verboten ist das nicht – es geht um Reproduzierbarkeit und Nachvollziehbarkeit." },
        { text: "Weil ein pro Umgebung gebautes Image automatisch kleiner ausfällt.", correct: false, feedback: "Nein, die Größe hängt nicht von der Zielumgebung ab." },
        { text: "Weil sich Images nach dem Bauen ohnehin nicht mehr starten lassen.", correct: false, feedback: "Doch – sie lassen sich starten, sie sind nur unveränderlich." }
      ]
    },
    {
      description: "Ein Dockerfile nutzt Multi-Stage Builds: Es gibt eine Build-Stage und eine schlanke finale Stage.",
      code: `FROM maven:3.9 AS build
COPY . /app
RUN mvn -f /app/pom.xml package

FROM eclipse-temurin:21-jre
COPY --from=build /app/target/*.jar /app.jar
CMD ["java", "-jar", "/app.jar"]`,
      question: "Welchen Vorteil hat dieser Ansatz für das fertige Image?",
      options: [
        { text: "Das finale Image enthält nur JRE und JAR – ohne Maven, Quellcode oder Build-Artefakte.", correct: true, feedback: "Richtig! Multi-Stage Builds trennen Build- von Laufzeit-Umgebung. Kleinere Images starten schneller und haben eine geringere Angriffsfläche – relevant für schnelle Skalierung." },
        { text: "Der Build wird deutlich schneller, weil Docker die beiden Stages parallel auf mehreren CPU-Kernen ausführt und die Ergebnisse am Ende zusammenführt.", correct: false, feedback: "Die Stages laufen sequenziell. Der Vorteil liegt in Größe und Sicherheit des finalen Images." },
        { text: "Man braucht dadurch kein Java mehr auf dem Zielsystem.", correct: false, feedback: "Das gilt für Container generell (die JRE steckt im Image), nicht speziell für Multi-Stage Builds." },
        { text: "Es ermöglicht, mehrere Anwendungen in einem Container zu betreiben.", correct: false, feedback: "Nein, damit hat Multi-Stage nichts zu tun." }
      ]
    },
    {
      description: "Ein Team pusht ein neues Image in eine Registry, ohne einen expliziten Tag anzugeben.",
      question: "Welchen Tag erhält das Image automatisch – und warum ist das in der Praxis problematisch?",
      options: [
        { text: "'latest' – der Tag wird bei jedem Push überschrieben, dann ist unklar, welche Version läuft.", correct: true, feedback: "Richtig! 'latest' ist kein Versionsversprechen, sondern nur der Default-Tag. Ohne explizite Tags verliert man Nachvollziehbarkeit und reproduzierbare Deployments." },
        { text: "'v1.0' – Docker erkennt die Version automatisch aus den Metadaten des Images und vergibt fortlaufend passende semantische Versionsnummern.", correct: false, feedback: "Nein, Docker vergibt keine automatischen Versionsnummern." },
        { text: "'stable' – Docker markiert erfolgreich gebaute Images automatisch als stabil.", correct: false, feedback: "Es gibt keinen automatisch vergebenen 'stable'-Tag." },
        { text: "Gar keinen Tag – das Image ist dann nicht auffindbar.", correct: false, feedback: "Falsch – ohne expliziten Tag wird automatisch 'latest' verwendet." }
      ]
    },
    {
      description: "In einer Container-Registry wird ein Image unter einem bestimmten Pfad gespeichert.",
      question: "Was beschreibt ein 'Repository' im Kontext einer Container-Registry?",
      options: [
        { text: "Eine Sammlung von Image-Versionen unter einem gemeinsamen Namen, z.B. 'mycompany/backend'.", correct: true, feedback: "Richtig! Ein Repository gruppiert alle Tags (Versionen) eines Images unter einem logischen Namen." },
        { text: "Ein Git-Repository, das den Quellcode samt Dockerfile enthält und aus dem die Registry bei jedem Commit automatisch ein neues Image baut.", correct: false, feedback: "Nicht im Registry-Kontext – hier geht es um Image-Repositories, nicht um Source-Code." },
        { text: "Ein einzelner laufender Container auf einem Server.", correct: false, feedback: "Nein, ein Container ist eine laufende Instanz. Das Repository liegt in der Registry." },
        { text: "Ein Backup sämtlicher Docker-Volumes eines Hosts.", correct: false, feedback: "Volumes haben nichts mit der Registry zu tun." }
      ]
    }
  ];

  let currentQuestion = 0;
  let score = 0;

  const questionContent = document.getElementById('question-content');
  const optionsContainer = document.getElementById('options-container');
  const feedbackEl = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');
  const progressBar = document.getElementById('progress-bar');
  const questionCounter = document.getElementById('question-counter');
  const scoreCounter = document.getElementById('score-counter');

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function loadQuestion() {
    const q = questions[currentQuestion];
    shuffleArray(q.options);
    feedbackEl.classList.add('hidden');
    nextBtn.classList.add('hidden');

    progressBar.style.width = `${((currentQuestion) / questions.length) * 100}%`;
    questionCounter.innerText = `Frage ${currentQuestion + 1} von ${questions.length}`;
    scoreCounter.innerText = `Punkte: ${score}`;

    let html = `
                <p class="text-neutral-400 mb-4 italic">"${q.description}"</p>
                <div class="bg-[#111111] p-4 rounded-xl border-l-4 border-[#ff5401] mb-6">
                    <p class="text-lg font-medium text-white">${q.question}</p>
                </div>
            `;

    if (q.code) {
      html += `<pre class="code-block p-4 rounded-lg text-sm text-green-400 mb-6 overflow-x-auto shadow-inner">${q.code}</pre>`;
    }

    questionContent.innerHTML = html;
    optionsContainer.innerHTML = '';

    q.options.forEach((opt, index) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn w-full p-4 rounded-xl text-neutral-200 shadow-sm hover:translate-x-1';
      btn.innerHTML = `
                    <div class="flex items-start gap-3">
                        <span class="flex-none w-6 h-6 rounded-full bg-[#333333] flex items-center justify-center text-xs font-bold">${String.fromCharCode(65 + index)}</span>
                        <span>${opt.text}</span>
                    </div>
                `;
      btn.onclick = () => handleAnswer(index);
      optionsContainer.appendChild(btn);
    });
  }

  function handleAnswer(index) {
    const q = questions[currentQuestion];
    const isCorrect = q.options[index].correct;
    const buttons = optionsContainer.querySelectorAll('.option-btn');

    buttons.forEach(btn => {
      btn.disabled = true;
      btn.classList.remove('hover:translate-x-1');
    });

    if (isCorrect) {
      buttons[index].classList.add('correct');
      score++;
    } else {
      buttons[index].classList.add('wrong');
      const correctIdx = q.options.findIndex(o => o.correct);
      buttons[correctIdx].classList.add('correct');
    }

    feedbackEl.innerText = q.options[index].feedback;
    feedbackEl.className = `mt-6 p-4 rounded-xl border-l-4 ${isCorrect ? 'bg-emerald-900/20 border-emerald-500 text-emerald-300' : 'bg-[#431407]/50 border-[#ff5401] text-orange-300'}`;
    feedbackEl.classList.remove('hidden');
    nextBtn.classList.remove('hidden');
    scoreCounter.innerText = `Punkte: ${score}`;
  }

  nextBtn.onclick = () => {
    currentQuestion++;
    if (currentQuestion < questions.length) {
      loadQuestion();
    } else {
      showResult();
    }
  };

  function showResult() {
    document.getElementById('question-card').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    progressBar.style.width = '100%';

    const percentage = (score / questions.length) * 100;
    let interpretation = "";

    if (percentage === 100) interpretation = "Herausragend! Du bist bestens vorbereitet für Kubernetes.";
    else if (percentage >= 80) interpretation = "Sehr gut! Die Docker-Grundlagen sitzen. Auf zu Kubernetes!";
    else if (percentage >= 50) interpretation = "Gute Basis! Schau dir die Erklärungen zu den falschen Antworten nochmal an.";
    else interpretation = "Ein guter Start! Frische die Docker-Grundlagen nochmal auf, bevor es mit Kubernetes weitergeht.";

    document.getElementById('final-score').innerText = `${score} von ${questions.length} Punkten (${Math.round(percentage)}%)`;
    document.getElementById('score-interpretation').innerText = interpretation;
  }

  loadQuestion();
</script>
</body>
</html>
